description: |-
  PHMD5 highway co-simulation scenario.
  SUMO is the master: all vehicle spawning and motion (including the ego) are controlled by SUMO.
  CARLA acts purely as a 3D visualizer for the SUMO traffic.
  No CARLA-controlled vehicles are created.

world:
  sync_mode: true
  client_port: 2000
  fixed_delta_seconds: 0.05
  seed: 11

vehicle_base:
  sensing:
    perception:
      activate: false
      camera:
        visualize: 0
        num: 1
        positions:
          - [2.5, 0, 2.0, 0]  # front camera
      lidar:
        visualize: false
        channels: 32
        range: 50
        points_per_second: 100000
        rotation_frequency: 20
        upper_fov: 10.0
        lower_fov: -30.0
        dropoff_general_rate: 0.0
        dropoff_intensity_limit: 1.0
        dropoff_zero_intensity: 0.0
        noise_stddev: 0.0
    localization:
      activate: false
      gnss:
        noise_alt_stddev: 0.0
        noise_lat_stddev: 0.0
        noise_lon_stddev: 0.0
        heading_direction_stddev: 0.0
        speed_stddev: 0.0
  map_manager:
    visualize: false
    activate: false

sumo:
  port: ~
  host: ~
  gui: true
  client_order: 1
  step_length: ${world.fixed_delta_seconds}

scenario:
  single_cav_list: []

merging_controller:
  # model_path: /path/to/onRampMerging/models/GRU-uniform-delay/GRU-uniform-delay_best  # defaults to onRampMerging submodule
  ego_id: ego
  radius: 50            
  max_delay: 20         
  delay_mode: uniform   
  use_safety: true      
  # Edge/lane where a successful merge is detected (FHWM network)
  merge_edge: "-1"
  merge_min_lane: 1
  # yolo_model_path: /path/to/yolov5m.pt  # defaults to yolov5m.pt in OpenCDA root
  # Optional: Performance evaluation log file (if --evaluation is enabled)
  evaluation_log: performance_metrics.csv